<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Game Spec Detector Pro - Max Database</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./icons/app-logo.jpg" type="image/jpeg">
  <link rel="apple-touch-icon" href="./icons/app-logo.jpg">
  <meta name="theme-color" content="#003791">
  <style>
    :root {
      --ps-blue-deep: #001740; --ps-blue-main: #003791; --ps-blue-light: #0072ce;
      --ps-accent: #00d9ff; --success: #4caf50; --warning: #ffeb3b; --danger: #f44336;
    }
    body {
      background: radial-gradient(circle at top, var(--ps-blue-main) 0%, var(--ps-blue-deep) 100%);
      background-attachment: fixed; color: white; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; min-height: 100vh;
    }
    .container { max-width: 850px; margin: 0 auto; padding: 20px 20px 50px; }
    .simulator-card {
      background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px);
      border-radius: 15px; padding: 25px; margin-bottom: 30px; border: 1px solid rgba(255, 255, 255, 0.2);
    }
    select, input {
      width: 100%; padding: 12px; border-radius: 8px; border: none;
      background: rgba(0, 0, 0, 0.4); color: white; margin-bottom: 15px; box-sizing: border-box;
    }
    .btn-calculate {
      width: 100%; background: var(--ps-accent); color: #000; border: none;
      padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer;
    }
    .game-card {
      background: rgba(0, 0, 0, 0.3); border-radius: 12px; padding: 15px;
      margin-bottom: 10px; border-left: 5px solid var(--ps-blue-light);
    }
    .spec-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
    .spec-item { background: rgba(255, 255, 255, 0.05); padding: 10px; border-radius: 5px; font-size: 0.75rem; }
    .spec-label { color: var(--ps-accent); font-weight: bold; display: block; margin-bottom: 4px; font-size: 0.65rem; text-transform: uppercase; }
    #resultArea { margin-top: 20px; padding: 15px; border-radius: 10px; text-align: center; display: none; border: 1px solid; }
  </style>
</head>
<body>
  <div class="container">
    <header style="text-align:center; padding:20px;">
      <h1>GAME SPEC DETECTOR PRO</h1>
      <p>Database: GTA, COD, RE, DW & Spek Rekomendasi</p>
    </header>

    <div class="simulator-card">
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <select id="userSpecs">
          <option value="6">Ryzen 5 3500U</option>
          <option value="18">RTX 3060</option>
          <option value="40">RTX 4080</option>
        </select>
        <select id="userRam">
          <option value="8">8GB RAM</option>
          <option value="16">16GB RAM</option>
          <option value="32">32GB RAM</option>
        </select>
      </div>
      <select id="targetGame"></select>
      <button class="btn-calculate" onclick="calculatePerformance()">CEK KOMPATIBILITAS</button>
      <div id="resultArea">
        <h2 id="fpsResult"></h2>
        <p id="statusResult"></p>
      </div>
    </div>

    <input type="text" id="gameSearch" placeholder="Cari Game (GTA, COD, RE...)" onkeyup="searchGame()">
    <div id="gameList"></div>
  </div>

  <script>
    const database = [
      // GTA SERIES
      { t: "GTA: San Andreas", g: "Action", min: "Pentium III | 256MB RAM", rec: "Pentium IV | 512MB RAM", w: 1, r: 1, s: "5GB" },
      { t: "GTA IV", g: "Action", min: "Core 2 Duo | 1.5GB RAM", rec: "Core 2 Quad | 4GB RAM", w: 3, r: 4, s: "16GB" },
      { t: "GTA V", g: "Action", min: "i5-3470 | 8GB RAM", rec: "i5-10400 | 16GB RAM", w: 6, r: 8, s: "110GB" },
      { t: "GTA VI", g: "Action", min: "Ryzen 5 5600 | 16GB RAM", rec: "Ryzen 9 | 32GB RAM", w: 28, r: 16, s: "200GB" },

      // CALL OF DUTY SERIES
      { t: "CoD: Modern Warfare (2007)", g: "FPS", min: "P4 | 1GB RAM", rec: "Core 2 Duo | 2GB RAM", w: 1, r: 2, s: "8GB" },
      { t: "CoD: Modern Warfare (2019)", g: "FPS", min: "i3-4340 | 8GB RAM", rec: "i5-2500K | 12GB RAM", w: 14, r: 8, s: "175GB" },
      { t: "CoD: Ghosts", g: "FPS", min: "i3-3225 | 6GB RAM", rec: "i5-2500K | 8GB RAM", w: 7, r: 6, s: "40GB" },
      { t: "CoD: Advanced Warfare", g: "FPS", min: "i3-530 | 6GB RAM", rec: "i5-2500K | 8GB RAM", w: 8, r: 6, s: "55GB" },
      { t: "CoD: Infinite Warfare", g: "FPS", min: "i3-3225 | 8GB RAM", rec: "i5-4460 | 12GB RAM", w: 9, r: 8, s: "70GB" },
      { t: "CoD: Black Ops 1", g: "FPS", min: "Core 2 Duo | 2GB RAM", rec: "Core 2 Quad | 4GB RAM", w: 3, r: 2, s: "12GB" },
      { t: "CoD: Black Ops Cold War", g: "FPS", min: "i5-2500K | 8GB RAM", rec: "i7-8700K | 16GB RAM", w: 15, r: 8, s: "175GB" },

      // RESIDENT EVIL SERIES
      { t: "Resident Evil 2 Remake", g: "Horror", min: "i5-4460 | 8GB RAM", rec: "i7-3770 | 8GB RAM", w: 6, r: 8, s: "26GB" },
      { t: "Resident Evil 4 Remake", g: "Horror", min: "Ryzen 3 | 8GB RAM", rec: "i7-8700 | 16GB RAM", w: 11, r: 8, s: "60GB" },
      { t: "Resident Evil Village", g: "Horror", min: "i5-7500 | 8GB RAM", rec: "i7-8700 | 16GB RAM", w: 9, r: 8, s: "50GB" },

      // DYNASTY WARRIORS SERIES
      { t: "Dynasty Warriors 6", g: "Action", min: "P4 | 1GB RAM", rec: "Core 2 Duo | 2GB RAM", w: 1, r: 2, s: "10GB" },
      { t: "Dynasty Warriors 8", g: "Action", min: "Core 2 Duo | 4GB RAM", rec: "i5 | 8GB RAM", w: 3, r: 4, s: "18GB" },
      { t: "Dynasty Warriors: Origins", g: "Action", min: "i5-8400 | 16GB RAM", rec: "i7-12700 | 16GB RAM", w: 15, r: 16, s: "80GB" },

      // OTHERS
      { t: "Black Myth: Wukong", g: "RPG", min: "i5-8400 | 16GB RAM", rec: "i7-9700 | 16GB RAM", w: 18, r: 16, s: "130GB" },
      { t: "Ghost of Tsushima", g: "Action", min: "i3-7100 | 8GB RAM", rec: "i5-8600 | 16GB RAM", w: 9, r: 8, s: "75GB" }
    ];

    const list = document.getElementById('gameList');
    const select = document.getElementById('targetGame');
    database.sort((a,b) => a.t.localeCompare(b.t)).forEach(g => {
      const op = document.createElement('option');
      op.value = JSON.stringify(g); op.innerText = g.t;
      select.appendChild(op);
      const card = document.createElement('div');
      card.className = 'game-card';
      card.setAttribute('data-search', g.t.toLowerCase());
      card.innerHTML = `<h3>${g.t}</h3>
        <div class="spec-grid">
          <div class="spec-item"><span class="spec-label">Minimal</span>${g.min}</div>
          <div class="spec-item"><span class="spec-label">Rekomendasi (Max)</span>${g.rec}</div>
          <div class="spec-item"><span class="spec-label">Size</span>${g.s}</div>
        </div>`;
      list.appendChild(card);
    });

    function calculatePerformance() {
      const uPower = parseInt(document.getElementById('userSpecs').value);
      const uRam = parseInt(document.getElementById('userRam').value);
      const game = JSON.parse(document.getElementById('targetGame').value);
      const res = document.getElementById('resultArea');
      res.style.display = "block";
      if (uRam < game.r) {
        document.getElementById('fpsResult').innerText = "CRASH";
        document.getElementById('statusResult').innerText = "RAM TIDAK CUKUP!";
        res.style.borderColor = "var(--danger)";
      } else {
        const ratio = uPower / game.w;
        document.getElementById('fpsResult').innerText = ratio < 0.8 ? "~20-30 FPS" : "60+ FPS";
        document.getElementById('statusResult').innerText = ratio < 0.8 ? "LAG / LOW SETTING" : "LANCAR JAYA / HIGH";
        res.style.borderColor = ratio < 0.8 ? "var(--warning)" : "var(--success)";
      }
    }
    function searchGame() {
      let val = document.getElementById('gameSearch').value.toLowerCase();
      let cards = document.getElementsByClassName('game-card');
      for (let c of cards) { c.style.display = c.getAttribute('data-search').includes(val) ? "" : "none"; }
    }

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
          .then(registration => {
            console.log('ServiceWorker registration successful with scope: ', registration.scope);
          }, err => {
            console.log('ServiceWorker registration failed: ', err);
          });
      });
    }
  </script>
</body>
</html>
